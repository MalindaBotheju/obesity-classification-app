name: Backend CI

# 1. The Trigger
on:
  push:
    branches: [ "main" ]

# 2. The Jobs
jobs:
  build-and-test:
    runs-on: ubuntu-latest # The virtual server GitHub spins up

    # 3. The Steps
    steps:
      - name: Grab the code from the repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Match this to your local Python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt